<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tiny Brunch</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link
      rel="icon"
      type="image/png"
      href="https://images.emojiterra.com/google/noto-emoji/unicode-15/color/512px/1f95e.png"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="game">
      <div class="game-intro">
        <div class="game-intro__panel">
          <h1>Tiny Brunch</h1>
          <p>Qui partage ce brunch aujourd’hui ?</p>

          <label>
            Joueur 1
            <input
              type="text"
              class="player-one-name"
              maxlength="16"
              autocomplete="off"
            />
          </label>

          <label>
            Joueur 2
            <input
              type="text"
              class="player-two-name"
              maxlength="16"
              autocomplete="off"
            />
          </label>

          <button type="button" class="start-game" disabled>Commencer</button>
        </div>
      </div>

      <div class="game-finished is-hidden">
        <p>Votre brunch est prêt</p>
        <div class="brunch-list-container"></div>
        <button class="send-command">Envoyer la commande</button>
      </div>
      <div class="scene-wrapper">
        <img
          src="assets/background/background.png"
          class="scene"
          alt="The scene of tiny brunch"
        />
        <!-- Assets -->
        <img
          class="pixel-art radio"
          src="assets/animated/radio1.png"
          alt="A radio"
          id="radio"
        />
        <img
          class="pixel-art cat1"
          src="assets/animated/chat1.png"
          alt="The cat 1"
          id="cat1"
        />

        <img
          class="pixel-art cat2"
          src="assets/animated/chat2.png"
          alt="The cat 2"
          id="cat2"
        />
 <img
          src="assets/background/filters.png"
          class="filter"
          alt="The filter of the scene of tiny brunch"
        />
        <!-- Clickable div -->
        <div class="radio" id="audio"></div>
        <div class="cat1" id="meow1"></div>
        <div class="cat2" id="meow2"></div>
      </div>
      <div class="player-transition" hidden>
        <p class="transition-message"></p>

        <button class="start-next-player" type="button">Continuer</button>
      </div>
      <section class="picker">
        <div class="picker-content">
          <p class="picker-player"></p>

          <div class="picker-category">
            <button class="previous-category" type="button">←</button>
            <h2 class="category-label"></h2>
            <button class="next-category" type="button">→</button>
          </div>

          <div class="picker-items"></div>

          <button class="validate-choice" type="button">Valider</button>
        </div>
      </section>
    </div>
  </body>
</html>

<script type="module" src="./scripts/app.js"></script>
