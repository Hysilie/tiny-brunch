<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tiny Brunch</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link
      rel="icon"
      type="image/png"
      href="https://images.emojiterra.com/google/noto-emoji/unicode-15/color/512px/1f95e.png"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <h1 id="welcome">Hello, welcome on Tiny Brunch✌️✨</h1>
    <button id="audio">Toggle ON/OFF music</button>
    <button id="meow1">Meow 1</button>
    <button id="meow2">Meow 2</button>

    <h2>Hot drinks :</h2>
    <img
      class="pixel-art"
      src="assets/foods/hot-drinks/coffee/dynamic/coffe-cup-dynamic1.png"
      alt="A cup of coffee"
      id="coffee"
    />

    <img
      class="pixel-art"
      src="assets/foods/hot-drinks/coffee/coffe-cup-static.png"
      alt="A cup of coffee"
      id="coffee-static"
    />
    <img
      class="pixel-art"
      src="assets/foods/hot-drinks/tea/dynamic/cup-tea-dynamic1.png"
      alt="A cup of tea"
      id="tea"
    />

    <img
      class="pixel-art"
      src="assets/foods/hot-drinks/tea/cup-tea-static.png"
      alt="A cup of tea"
      id="tea-static"
    />
    <img
      class="pixel-art"
      src="assets/foods/hot-drinks/coffee/cup-latte.png"
      alt="A cup of latte"
      id="latte"
    />
    <img
      class="pixel-art"
      src="assets/foods/hot-drinks/tea/cup-macha.png"
      alt="A cup of macha"
      id="latte"
    />
    <h2>Cold drinks :</h2>
    <img
      class="pixel-art"
      src="assets/foods/cold-drinks/orange-juice.png"
      alt="An orange juice"
      id="orange"
    />
    <img
      class="pixel-art"
      src="assets/foods/cold-drinks/lemon-juice.png"
      alt="A lemon juice"
      id="lemon"
    />
    <img
      class="pixel-art"
      src="assets/foods/cold-drinks/smoothie.png"
      alt="A smoothie"
      id="smoothie"
    />
    <img
      class="pixel-art"
      src="assets/foods/cold-drinks/soda.png"
      alt="A soda"
      id="soda"
    />

    <h2>Sweet :</h2>
    <img
      class="pixel-art"
      src="assets/foods/sweet/cookie.png"
      alt="Two cookies"
      id="cookie"
    />
    <img
      class="pixel-art"
      src="assets/foods/sweet/slice-of-cake.png"
      alt="Slice of cake"
      id="cake"
    />
    <img
      class="pixel-art"
      src="assets/foods/sweet/toast.png"
      alt="A toast"
      id="toast"
    />
    <img
      class="pixel-art"
      src="assets/foods/sweet/pancakes.png"
      alt="Some pancakes"
      id="pancakes"
    />
    <h2>Main :</h2>
    <img
      class="pixel-art"
      src="assets/foods/main/salted-pancakes.png"
      alt="Some salted pancakes with egg and bacon"
      id="salted-pancakes"
    />
    <img
      class="pixel-art"
      src="assets/foods/main/salted-toast.png"
      alt="An avocado toast with egg"
      id="salted-toast"
    />
    <img
      class="pixel-art"
      src="assets/foods/main/bagel.png"
      alt="A bagel"
      id="bagel"
    />
    <img
      class="pixel-art"
      src="assets/foods/main/salad.png"
      alt="A salad"
      id="salad"
    />
    <h2>Extra :</h2>
    <img
      class="pixel-art"
      src="assets/foods/extra/egg-and-bacon.png"
      alt="Egg and bacon"
      id="egg-bacon"
    />
  </body>
</html>

<script type="module" src="./scripts/app.js"></script>
