    <div class="game">
      <div class="scene-wrapper">
        <img
          src="assets/background/background.png"
          class="scene"
          alt="The scene of tiny brunch"
        />
        <!-- Assets -->
        <img
          class="pixel-art radio"
          src="assets/animated/radio1.png"
          alt="A radio"
          id="radio"
        />
        <img
          class="pixel-art cat1"
          src="assets/animated/chat1.png"
          alt="The cat 1"
          id="cat1"
        />

        <img
          class="pixel-art cat2"
          src="assets/animated/chat2.png"
          alt="The cat 2"
          id="cat2"
        />


        <!-- Food -->
        <!-- Hot drinks -->
        <img
          class="pixel-art hdrink-1"
          src="assets/foods/hot-drinks/coffee.png"
          alt="Hot drink for player 1"
          id="hdrink-1"
        />

        <img
          class="pixel-art hdrink-2"
          src="assets/foods/hot-drinks/matcha.png"
          alt="Hot drink for player 2"
          id="hdrink-2"
        />

        <!-- Cold drinks -->

        <img
          class="pixel-art cdrink-1"
          src="assets/foods/cold-drinks/orange-juice.png"
          alt="Cold drink for player 1"
          id="cdrink-1"

          class="pixel-art cdrink-2"
          src="assets/foods/cold-drinks/lemon-juice.png"
          alt="Cold drink for player 2"
          id="cdrink-2"
        />

          class="pixel-art main-1 salted-pancakes"
          src="assets/foods/main/salted-pancakes.png"
          alt="Main for player 1"
          id="main-1"
        />

        <img
          class="pixel-art main-2 salted-toast"
          src="assets/foods/main/salted-toast.png"
          alt="Main for player 2"
          id="main-2"
        />

        <!-- Sweet -->

        <img
          class="pixel-art sweet-1 cookie"
          src="assets/foods/sweet/cookie.png"
          alt="Sweet for player 1"
          id="sweet-1"
        />

        <img
          class="pixel-art sweet-2 toast"
          src="assets/foods/sweet/toast.png"
          alt="Sweet for player 2"
          id="sweet-2"
        />

        <!-- Fruits -->

          src="assets/foods/fruits/banana.png"
          alt="A fruit for player 1"
          id="fruit-1"
        />
        <img
          class="pixel-art fruit-2 kiwi"
          src="assets/foods/fruits/kiwi.png"
          alt="A fruit for player 2"
          id="fruit-2"
        />

        <!-- Fruits -->
        <img
          class="pixel-art extra-1 cheese"
          src="assets/foods/extra/cheese.png"
          alt="An extra for player 1"
          id="extra-1"
        />
        <img
          class="pixel-art extra-2 yogourt"
          src="assets/foods/extra/yogourt.png"
          alt="An extra for player 2"
          id="extra-2"

    <img

          alt="The filter of the scene of tiny brunch"

 <!-- Clickable div -->
        <div class="radio" id="audio"></div>
        <div class="cat1" id="meow1"></div>
        <div class="cat2" id="meow2"></div>

      <section class="picker">

  <div class="picker-category">

  </div>
